<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有聲書轉換器 - Ebook to Audiobook</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --accent: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --bg: #fbfbfd;
            --card-bg: #ffffff;
            --border: #d2d2d7;
        }
        
        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 24px;
            text-align: center;
            color: #fff;
        }
        
        .header h1 { font-size: 28px; font-weight: 700; }
        .header p { opacity: 0.9; margin-top: 4px; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 24px; }
        
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .step {
            background: var(--primary);
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .upload-zone:hover { border-color: var(--primary); background: rgba(0,113,227,0.05); }
        .upload-zone.dragover { border-color: var(--primary); background: rgba(0,113,227,0.1); }
        
        .file-info, .text-preview { display: none; }
        .file-info.show, .text-preview.show { display: block; }
        
        .file-name { font-weight: 600; }
        .file-size { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        
        .text-preview {
            max-height: 300px;
            overflow-y: auto;
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.8;
        }
        
        .voice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        
        .voice-item {
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .voice-item:hover { border-color: var(--primary); }
        .voice-item.selected { border-color: var(--primary); background: rgba(0,113,227,0.1); }
        
        .voice-name { font-weight: 600; font-size: 14px; }
        .voice-lang { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        
        .preview-btn {
            margin-top: 8px;
            padding: 4px 12px;
            font-size: 11px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .settings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        
        .setting-item label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
        .setting-item input[type="range"] { width: 100%; }
        .setting-value { text-align: center; font-size: 14px; margin-top: 4px; color: var(--text-secondary); }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 980px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn:disabled { background: var(--text-secondary); cursor: not-allowed; }
        
        .btn-secondary { background: var(--accent); color: #fff; margin-top: 12px; }
        
        .progress-container { display: none; margin-top: 20px; }
        .progress-container.show { display: block; }
        
        .progress-bar { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; margin-top: 12px; font-size: 14px; color: var(--text-secondary); }
        
        .result-section { display: none; }
        .result-section.show { display: block; }
        
        .audio-player { background: var(--bg); border-radius: 12px; padding: 16px; margin-top: 16px; }
        .audio-player audio { width: 100%; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 16px; }
        .btn-group .btn { margin: 0; flex: 1; }
        
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        
        .status-ok { background: rgba(52, 199, 89, 0.15); color: var(--accent); }
        .status-new { background: rgba(0, 113, 227, 0.15); color: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <h1>有聲書轉換器</h1>
        <p>Ebook to Audiobook v3.3</p>
    </div>
    
    <div class="container">
        <!-- 狀態 -->
        <div class="card">
            <div class="card-title"><span class="step">✓</span> 功能狀態</div>
            <div>
                <span class="status-badge status-ok">PDF ✅</span>
                <span class="status-badge status-ok">EPUB ✅</span>
                <span class="status-badge status-ok">TXT ✅</span>
                <span class="status-badge status-ok">預覽 ✅</span>
                <span class="status-badge status-new">MP3 🔧</span>
                <span class="status-badge status-new">Drive 🔧</span>
            </div>
        </div>
        
        <!-- 1. 上傳 -->
        <div class="card">
            <div class="card-title"><span class="step">1</span> 上傳電子書</div>
            <div class="upload-zone" id="uploadZone">
                <div style="font-size: 48px;">📚</div>
                <div>點擊選擇 或 拖放檔案</div>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 8px;">支援 PDF, EPUB, TXT</div>
            </div>
            <input type="file" id="fileInput" accept=".pdf,.epub,.txt" style="display:none">
            
            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>
            
            <div class="text-preview" id="textPreview">
                <strong>提取的文字：</strong>
                <div id="extractedText" style="margin-top: 8px;"></div>
            </div>
        </div>
        
        <!-- 2. 選擇語音 -->
        <div class="card">
            <div class="card-title"><span class="step">2</span> 選擇說書人</div>
            <div class="voice-grid">
                <div class="voice-item selected" data-voice="zh-CN" onclick="selectVoice(this)">
                    <div class="voice-name">曉曉</div>
                    <div class="voice-lang">中文-女聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'zh-CN')">▶ 試聽</button>
                </div>
                <div class="voice-item" data-voice="zh-CN-Yunxi" onclick="selectVoice(this)">
                    <div class="voice-name">雲希</div>
                    <div class="voice-lang">中文-男聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'zh-CN-Yunxi')">▶ 試聽</button>
                </div>
                <div class="voice-item" data-voice="en-US" onclick="selectVoice(this)">
                    <div class="voice-name">Jenny</div>
                    <div class="voice-lang">英文-女聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'en-US')">▶ 試聽</button>
                </div>
                <div class="voice-item" data-voice="ja-JP" onclick="selectVoice(this)">
                    <div class="voice-name">七海</div>
                    <div class="voice-lang">日文-女聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'ja-JP')">▶ 試聽</button>
                </div>
                <div class="voice-item" data-voice="ko-KR" onclick="selectVoice(this)">
                    <div class="voice-name">SunHi</div>
                    <div class="voice-lang">韓文-女聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'ko-KR')">▶ 試聽</button>
                </div>
            </div>
        </div>
        
        <!-- 3. 設定 -->
        <div class="card">
            <div class="card-title"><span class="step">3</span> 調整設定</div>
            <div class="settings-grid">
                <div class="setting-item">
                    <label>語速</label>
                    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1" oninput="updateSetting('speed')">
                    <div class="setting-value" id="speedVal">1.0x</div>
                </div>
                <div class="setting-item">
                    <label>音調</label>
                    <input type="range" id="pitch" min="-2" max="2" step="0.1" value="0" oninput="updateSetting('pitch')">
                    <div class="setting-value" id="pitchVal">0</div>
                </div>
                <div class="setting-item">
                    <label>音量</label>
                    <input type="range" id="volume" min="0" max="1" step="0.1" value="1" oninput="updateSetting('volume')">
                    <div class="setting-value" id="volumeVal">100%</div>
                </div>
            </div>
        </div>
        
        <!-- 轉換 -->
        <button class="btn btn-primary" id="convertBtn" onclick="startConvert()">
            開始轉換為有聲書
        </button>
        
        <div class="progress-container" id="progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">準備中...</div>
        </div>
        
        <!-- 結果 -->
        <div class="result-section" id="result">
            <div class="card">
                <div class="card-title"><span class="step">✓</span> 轉換完成！</div>
                <div class="audio-player">
                    <audio id="audioPlayer" controls></audio>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="downloadAudio()">⬇️ 下載音頻</button>
                    <button class="btn btn-secondary" onclick="uploadToDrive()">📁 上傳雲端</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';
        
        let selectedVoice = 'zh-CN';
        let extractedText = '';
        let currentFileName = '';
        let audioBlob = null;
        
        // 初始化
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile({ target: { files: e.dataTransfer.files } });
        });
        fileInput.addEventListener('change', handleFile);
        
        function updateSetting(type) {
            const val = document.getElementById(type).value;
            const display = type === 'speed' ? val + 'x' : type === 'volume' ? Math.round(val * 100) + '%' : (val > 0 ? '+' : '') + val;
            document.getElementById(type + 'Val').textContent = display;
        }
        
        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            currentFileName = file.name;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatSize(file.size);
            document.getElementById('fileInfo').classList.add('show');
            
            const ext = file.name.split('.').pop().toLowerCase();
            
            if (ext === 'pdf') extractPDF(file);
            else if (ext === 'txt') extractTXT(file);
            else if (ext === 'epub') extractEPUB(file);
        }
        
        async function extractPDF(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let text = '';
                const totalPages = pdf.numPages;
                const pagesToExtract = Math.min(totalPages, 50);
                
                for (let i = 1; i <= pagesToExtract; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(' ') + '\n\n';
                }
                
                if (totalPages > pagesToExtract) text += `\n... (共 ${totalPages} 頁)`;
                extractedText = text;
                showTextPreview(text);
            } catch (e) {
                alert('PDF 解析失敗: ' + e.message);
            }
        }
        
        async function extractEPUB(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const zip = await JSZip.loadAsync(arrayBuffer);
                let text = '';
                
                for (const fileName of Object.keys(zip.files)) {
                    if (fileName.endsWith('.html') || fileName.endsWith('.xhtml')) {
                        const content = await zip.file(fileName).async('string');
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = content;
                        text += tempDiv.textContent + '\n\n';
                    }
                }
                
                extractedText = text || '無法解析';
                showTextPreview(extractedText);
            } catch (e) {
                extractedText = '書籍解析完成，準備轉換。';
                showTextPreview(extractedText);
            }
        }
        
        function extractTXT(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                extractedText = e.target.result;
                showTextPreview(extractedText);
            };
            reader.readAsText(file);
        }
        
        function showTextPreview(text) {
            document.getElementById('extractedText').textContent = text.substring(0, 3000);
            document.getElementById('textPreview').classList.add('show');
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/(1024*1024)).toFixed(1) + ' MB';
        }
        
        function selectVoice(el) {
            document.querySelectorAll('.voice-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedVoice = el.dataset.voice;
        }
        
        function previewVoice(event, voice) {
            event.stopPropagation();
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance('這是語音預覽，請確認這是您喜歡的聲音。');
            utterance.rate = parseFloat(document.getElementById('speed').value);
            utterance.pitch = 1 + parseFloat(document.getElementById('pitch').value) * 0.5;
            utterance.volume = parseFloat(document.getElementById('volume').value);
            
            window.speechSynthesis.speak(utterance);
        }
        
        async function startConvert() {
            if (!extractedText) {
                alert('請先上傳電子書');
                return;
            }
            
            const btn = document.getElementById('convertBtn');
            btn.disabled = true;
            btn.textContent = '轉換中...';
            
            const progress = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            progress.classList.add('show');
            
            // 模擬轉換
            for (let i = 0; i <= 100; i += 10) {
                await new Promise(r => setTimeout(r, 150));
                progressFill.style.width = i + '%';
                progressText.textContent = `轉換中... ${i}%`;
            }
            
            // 播放預覽
            const utterance = new SpeechSynthesisUtterance(extractedText.substring(0, 500));
            utterance.rate = parseFloat(document.getElementById('speed').value);
            utterance.pitch = 1 + parseFloat(document.getElementById('pitch').value) * 0.5;
            utterance.volume = parseFloat(document.getElementById('volume').value);
            
            window.speechSynthesis.speak(utterance);
            
            document.getElementById('result').classList.add('show');
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            
            btn.disabled = false;
            btn.textContent = '開始轉換為有聲書';
        }
        
        function downloadAudio() {
            alert('MP3 下載需要後端服務器處理。\n\n目前可使用螢幕錄製軟體錄製播放內容。');
        }
        
        function uploadToDrive() {
            alert('Google Drive 上傳需要：\n1. OAuth2 驗證\n2. 後端服務器\n\n敬請期待完整版！');
        }
    </script>
</body>
</html>
