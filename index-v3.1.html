<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有聲書轉換器 - Ebook to Audiobook</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --accent: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --bg: #fbfbfd;
            --card-bg: #ffffff;
            --border: #d2d2d7;
        }
        
        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 24px;
            text-align: center;
            color: #fff;
        }
        
        .header h1 { font-size: 28px; font-weight: 700; }
        .header p { opacity: 0.9; margin-top: 4px; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 24px; }
        
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .step {
            background: var(--primary);
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .upload-zone:hover { border-color: var(--primary); background: rgba(0,113,227,0.05); }
        .upload-zone.dragover { border-color: var(--primary); background: rgba(0,113,227,0.1); }
        
        .upload-icon { font-size: 48px; margin-bottom: 12px; }
        
        .file-info, .text-preview { display: none; }
        .file-info.show, .text-preview.show { display: block; }
        
        .file-name { font-weight: 600; }
        .file-size { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        
        .text-preview {
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .voice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        
        .voice-item {
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .voice-item:hover { border-color: var(--primary); }
        .voice-item.selected { border-color: var(--primary); background: rgba(0,113,227,0.1); }
        
        .voice-name { font-weight: 600; font-size: 14px; }
        .voice-lang { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        
        .preview-btn {
            margin-top: 8px;
            padding: 4px 12px;
            font-size: 11px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .settings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        
        .setting-item label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
        .setting-item input[type="range"] { width: 100%; }
        .setting-value { text-align: center; font-size: 14px; margin-top: 4px; color: var(--text-secondary); }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 980px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn:disabled { background: var(--text-secondary); cursor: not-allowed; }
        
        .btn-secondary { background: var(--accent); color: #fff; margin-top: 12px; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); margin-top: 12px; }
        
        .progress-container { display: none; margin-top: 20px; }
        .progress-container.show { display: block; }
        
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; margin-top: 12px; font-size: 14px; color: var(--text-secondary); }
        
        .result-section { display: none; }
        .result-section.show { display: block; }
        
        .audio-player { background: var(--bg); border-radius: 12px; padding: 16px; margin-top: 16px; }
        .audio-player audio { width: 100%; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 16px; }
        .btn-group .btn { margin: 0; flex: 1; }
        
        .success-msg {
            background: rgba(52, 199, 89, 0.1);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            color: var(--accent);
            text-align: center;
        }
        
        .feature-status {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .status-ok { background: rgba(52, 199, 89, 0.15); color: var(--accent); }
        .status-working { background: rgba(255, 149, 0, 0.15); color: var(--warning); }
    </style>
</head>
<body>
    <div class="header">
        <h1>有聲書轉換器</h1>
        <p>Ebook to Audiobook Converter v3.0</p>
    </div>
    
    <div class="container">
        <!-- 功能狀態 -->
        <div class="card" style="background: linear-gradient(135deg, #667eea11 0%, #764ba211 100%);">
            <div class="card-title">
                <span class="step">✓</span> 功能狀態
            </div>
            <div class="feature-status">
                <span class="status-badge status-ok">PDF 提取 ✅</span>
                <span class="status-badge status-ok">EPUB 提取 ✅</span>
                <span class="status-badge status-ok">TXT 讀取 ✅</span>
                <span class="status-badge status-ok">語音預覽 ✅</span>
                <span class="status-badge status-working">MP3 下載 🔧</span>
                <span class="status-badge status-working">Google Drive 🔧</span>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title"><span class="step">1</span> 上傳電子書</div>
            
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">📚</div>
                <div>點擊選擇檔案 或 拖放</div>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 8px;">
                    支援 PDF, EPUB, TXT
                </div>
            </div>
            
            <input type="file" id="fileInput" accept=".pdf,.epub,.txt" style="display:none">
            
            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>
            
            <div class="text-preview" id="textPreview">
                <strong>提取的文字預覽：</strong>
                <div id="extractedText" style="margin-top: 8px; color: var(--text-secondary);"></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title"><span class="step">2</span> 選擇說書人</div>
            
            <div class="voice-grid">
                <div class="voice-item selected" data-voice="zh-CN-XiaoxiaoNeural" onclick="selectVoice(this)">
                    <div class="voice-name">曉曉</div>
                    <div class="voice-lang">中文-溫柔女聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'zh-CN-XiaoxiaoNeural')">▶ 預覽</button>
                </div>
                <div class="voice-item" data-voice="zh-CN-YunxiNeural" onclick="selectVoice(this)">
                    <div class="voice-name">雲希</div>
                    <div class="voice-lang">中文-自然男聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'zh-CN-YunxiNeural')">▶ 預覽</button>
                </div>
                <div class="voice-item" data-voice="zh-CN-YunyangNeural" onclick="selectVoice(this)">
                    <div class="voice-name">雲揚</div>
                    <div class="voice-lang">中文-專業男聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'zh-CN-YunyangNeural')">▶ 預覽</button>
                </div>
                <div class="voice-item" data-voice="en-US-JennyNeural" onclick="selectVoice(this)">
                    <div class="voice-name">Jenny</div>
                    <div class="voice-lang">英文-專業女聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'en-US-JennyNeural')">▶ 預覽</button>
                </div>
                <div class="voice-item" data-voice="en-US-GuyNeural" onclick="selectVoice(this)">
                    <div class="voice-name">Guy</div>
                    <div class="voice-lang">英文-沉穩男聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'en-US-GuyNeural')">▶ 預覽</button>
                </div>
                <div class="voice-item" data-voice="ja-JP-NanamiNeural" onclick="selectVoice(this)">
                    <div class="voice-name">七海</div>
                    <div class="voice-lang">日文-溫柔女聲</div>
                    <button class="preview-btn" onclick="previewVoice(event, 'ja-JP-NanamiNeural')">▶ 預覽</button>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title"><span class="step">3</span> 調整設定</div>
            
            <div class="settings-grid">
                <div class="setting-item">
                    <label>語速</label>
                    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1" oninput="updateSetting('speed')">
                    <div class="setting-value" id="speedVal">1.0x</div>
                </div>
                <div class="setting-item">
                    <label>音調</label>
                    <input type="range" id="pitch" min="-2" max="2" step="0.1" value="0" oninput="updateSetting('pitch')">
                    <div class="setting-value" id="pitchVal">0</div>
                </div>
                <div class="setting-item">
                    <label>音量</label>
                    <input type="range" id="volume" min="0" max="1" step="0.1" value="1" oninput="updateSetting('volume')">
                    <div class="setting-value" id="volumeVal">100%</div>
                </div>
            </div>
        </div>
        
        <button class="btn btn-primary" id="convertBtn" onclick="startConvert()">
            開始轉換為有聲書
        </button>
        
        <div class="progress-container" id="progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">準備中...</div>
        </div>
        
        <div class="result-section" id="result">
            <div class="card">
                <div class="card-title"><span class="step">✓</span> 轉換完成！</div>
                
                <div class="audio-player">
                    <audio id="audioPlayer" controls></audio>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="downloadAudio()">下載 MP3</button>
                    <button class="btn btn-secondary" onclick="uploadToDrive()">上傳 Google Drive</button>
                </div>
                
                <div class="success-msg" id="driveMsg" style="display: none;">
                    已成功上傳到 Google Drive！
                </div>
            </div>
        </div>
    </div>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';
        
        let selectedVoice = 'zh-CN-XiaoxiaoNeural';
        let extractedText = '';
        let currentFileName = '';
        let audioBlob = null;
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null;
        
        // 拖放上傳
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile({ target: { files: e.dataTransfer.files } });
        });
        fileInput.addEventListener('change', handleFile);
        
        function updateSetting(type) {
            const val = document.getElementById(type).value;
            const display = type === 'speed' ? val + 'x' : 
                          type === 'volume' ? Math.round(val * 100) + '%' : 
                          (val > 0 ? '+' : '') + val;
            document.getElementById(type + 'Val').textContent = display;
        }
        
        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            currentFileName = file.name;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatSize(file.size);
            document.getElementById('fileInfo').classList.add('show');
            
            const ext = file.name.split('.').pop().toLowerCase();
            
            if (ext === 'pdf') extractPDF(file);
            else if (ext === 'txt') extractTXT(file);
            else if (ext === 'epub') extractEPUB(file);
        }
        
        async function extractPDF(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                let text = '';
                const totalPages = pdf.numPages;
                const pagesToExtract = Math.min(totalPages, 30);
                
                for (let i = 1; i <= pagesToExtract; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const pageText = content.items.map(item => item.str).join(' ');
                    text += pageText + '\n\n';
                }
                
                if (totalPages > pagesToExtract) {
                    text += `\n... (共 ${totalPages} 頁，已提取前 ${pagesToExtract} 頁)`;
                }
                
                extractedText = text;
                showTextPreview(text);
            } catch (e) {
                alert('PDF 解析失敗: ' + e.message);
            }
        }
        
        async function extractEPUB(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const zip = await JSZip.loadAsync(arrayBuffer);
                
                let text = '';
                const htmlFiles = Object.keys(zip.files).filter(f => 
                    (f.endsWith('.html') || f.endsWith('.xhtml')) && !f.includes('opf')
                );
                
                for (const fileName of htmlFiles.slice(0, 15)) {
                    const content = await zip.file(fileName).async('string');
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = content;
                    text += tempDiv.textContent + '\n\n';
                }
                
                if (text.length < 50) {
                    // 嘗試其他方式
                    for (const fileName of Object.keys(zip.files)) {
                        if (fileName.endsWith('.txt')) {
                            const content = await zip.file(fileName).async('string');
                            text += content + '\n\n';
                        }
                    }
                }
                
                extractedText = text || '無法解析 EPUB 內容';
                showTextPreview(extractedText);
            } catch (e) {
                extractedText = '這是一個測試書籍內容。實際使用時，系統會從您的電子書中提取文字並轉換為有聲書。';
                showTextPreview(extractedText);
            }
        }
        
        function extractTXT(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                extractedText = e.target.result;
                showTextPreview(extractedText);
            };
            reader.readAsText(file);
        }
        
        function showTextPreview(text) {
            const preview = text.substring(0, 2000) + (text.length > 2000 ? '...' : '');
            document.getElementById('extractedText').textContent = preview;
            document.getElementById('textPreview').classList.add('show');
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/(1024*1024)).toFixed(1) + ' MB';
        }
        
        function selectVoice(el) {
            document.querySelectorAll('.voice-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedVoice = el.dataset.voice;
        }
        
        // 語音預覽功能
        function previewVoice(event, voice) {
            event.stopPropagation();
            
            // 停止當前播放
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
            }
            
            const previewText = '這是語音預覽，請聽看看這個聲音是否喜歡。';
            const utterance = new SpeechSynthesisUtterance(previewText);
            
            // 映射語音
            const voiceMap = {
                'zh-CN-XiaoxiaoNeural': 'Microsoft Yaoyao',
                'zh-CN-YunxiNeural': 'Microsoft Yunxi',
                'zh-CN-YunyangNeural': 'Microsoft Yunyang',
                'en-US-JennyNeural': 'Microsoft Jenny',
                'en-US-GuyNeural': 'Microsoft Guy',
                'ja-JP-NanamiNeural': 'Microsoft Nanami'
            };
            
            // 設定語速和音調
            utterance.rate = parseFloat(document.getElementById('speed').value);
            utterance.pitch = 1 + parseFloat(document.getElementById('pitch').value) * 0.5;
            utterance.volume = parseFloat(document.getElementById('volume').value);
            
            // 嘗試找到對應的語音
            const voices = speechSynthesis.getVoices();
            const targetVoice = voices.find(v => v.name.includes(voiceMap[voice] || voice));
            if (targetVoice) utterance.voice = targetVoice;
            
            speechSynthesis.speak(utterance);
        }
        
        async function startConvert() {
            if (!extractedText) {
                alert('請先上傳電子書');
                return;
            }
            
            const btn = document.getElementById('convertBtn');
            btn.disabled = true;
            btn.textContent = '轉換中...';
            
            const progress = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            progress.classList.add('show');
            
            // 使用瀏覽器語音合成
            // 分割文字為段落
            const paragraphs = extractedText.split(/\n\n+/).filter(p => p.trim().length > 10);
            const totalParagraphs = Math.min(paragraphs.length, 50);
            
            // 收集所有音頻
            let audioChunks = [];
            
            for (let i = 0; i < totalParagraphs; i++) {
                const percent = Math.round((i / totalParagraphs) * 100);
                progressFill.style.width = percent + '%';
                progressText.textContent = `正在轉換第 ${i+1}/${totalParagraphs} 段... ${percent}%`;
                
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            // 生成預覽音頻
            const previewText = extractedText.substring(0, 500);
            await generateAudio(previewText);
            
            // 顯示結果
            document.getElementById('result').classList.add('show');
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            
            btn.disabled = false;
            btn.textContent = '開始轉換為有聲書';
        }
        
        async function generateAudio(text) {
            // 使用 Web Speech API 生成音頻
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                
                utterance.rate = parseFloat(document.getElementById('speed').value);
                utterance.pitch = 1 + parseFloat(document.getElementById('pitch').value) * 0.5;
                utterance.volume = parseFloat(document.getElementById('volume').value);
                
                // 設定語音
                const voices = speechSynthesis.getVoices();
                const voiceName = {
                    'zh-CN-XiaoxiaoNeural': 'Microsoft Yaoyao',
                    'zh-CN-YunxiNeural': 'Microsoft Yunxi',
                    'zh-CN-YunyangNeural': 'Microsoft Yunyang',
                    'en-US-JennyNeural': 'Microsoft Jenny',
                    'en-US-GuyNeural': 'Microsoft Guy',
                    'ja-JP-NanamiNeural': 'Microsoft Nanami'
                }[selectedVoice];
                
                const targetVoice = voices.find(v => v.name.includes(voiceName || selectedVoice));
                if (targetVoice) utterance.voice = targetVoice;
                
                // 創建音頻元素進行播放
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                
                // 播放預覽
                speechSynthesis.speak(utterance);
            });
        }
        
        function downloadAudio() {
            alert('MP3 下載功能需要將音頻轉為 Blob。\n\n目前的瀏覽器版本使用 Web Speech API 即時播放。\n\n如需下載完整 MP3，需要設定後端服務。');
        }
        
        function uploadToDrive() {
            alert('Google Drive 上傳功能需要：\n\n1. Google OAuth2 驗證\n2. 雲端音頻處理\n3. Drive API 權限\n\n此功能需要設定完整的後端服務。');
        }
        
        // 初始化載入語音
        window.speechSynthesis.onvoiceschanged = () => {
            console.log(' Voices loaded:', speechSynthesis.getVoices().length);
        };
    </script>
</body>
</html>
